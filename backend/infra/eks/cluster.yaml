apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: go-banking-eks
  region: us-east-1
  version: "1.31"

availabilityZones:
  - us-east-1a
  - us-east-1b

managedNodeGroups:
  - name: go-banking-ng
    instanceType: t3.small
    desiredCapacity: 1
    minSize: 1
    maxSize: 2
    volumeSize: 20
    ssh:
      allow: false
